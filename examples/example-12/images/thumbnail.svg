<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="timeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Lock icon -->
  <g transform="translate(150, 80)">
    <!-- Lock body -->
    <rect x="20" y="40" width="60" height="70" rx="5" fill="url(#lockGrad)" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M 30 40 Q 30 10, 50 10 Q 70 10, 70 40" 
          stroke="url(#lockGrad)" 
          stroke-width="8" 
          fill="none" 
          opacity="0.9"/>
    <!-- Keyhole -->
    <circle cx="50" cy="70" r="8" fill="#1a1a2e"/>
    <rect x="46" y="70" width="8" height="20" fill="#1a1a2e"/>
  </g>
  
  <!-- Clock/time elements -->
  <g transform="translate(280, 100)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#timeGrad)" stroke-width="3" opacity="0.8"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="url(#timeGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="15" y2="0" stroke="url(#timeGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Blockchain blocks -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="30" height="30" rx="3" fill="#fff" opacity="0.15"/>
    <rect x="35" y="0" width="30" height="30" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="70" y="0" width="30" height="30" rx="3" fill="#fff" opacity="0.25"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">
    Time-Locked Messages
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="255" font-family="Arial, sans-serif" font-size="14" fill="#00cec9" text-anchor="middle">
    Blocklock Encryption
  </text>
</svg>
