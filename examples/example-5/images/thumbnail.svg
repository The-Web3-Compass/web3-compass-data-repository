<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="shapeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shapeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shapeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Random shapes representing NFTs -->
  <circle cx="100" cy="150" r="40" fill="url(#shapeGrad)" opacity="0.8"/>
  <rect x="160" y="110" width="80" height="80" fill="url(#shapeGrad2)" opacity="0.8"/>
  <polygon points="320,110 360,190 280,190" fill="url(#shapeGrad3)" opacity="0.8"/>
  
  <!-- Dice/randomness symbol -->
  <g transform="translate(30, 30)">
    <rect x="0" y="0" width="50" height="50" rx="5" fill="#fff" opacity="0.2"/>
    <circle cx="15" cy="15" r="3" fill="#fff"/>
    <circle cx="35" cy="15" r="3" fill="#fff"/>
    <circle cx="15" cy="35" r="3" fill="#fff"/>
    <circle cx="35" cy="35" r="3" fill="#fff"/>
    <circle cx="25" cy="25" r="3" fill="#fff"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">
    Random NFT Traits
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle">
    Threshold Randomness for NFTs
  </text>
</svg>
