<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Cross-Chain Swap</text>
  
  <!-- Chain A (Left) -->
  <circle cx="100" cy="150" r="40" fill="url(#chainGradient)" opacity="0.8"/>
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Chain A</text>
  
  <!-- Chain B (Right) -->
  <circle cx="300" cy="150" r="40" fill="url(#chainGradient)" opacity="0.8"/>
  <text x="300" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Chain B</text>
  
  <!-- Swap Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981" />
    </marker>
  </defs>
  <line x1="140" y1="140" x2="260" y2="140" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="260" y1="160" x2="140" y2="160" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Lock Icon on Chain A -->
  <rect x="90" y="180" width="20" height="15" fill="none" stroke="#fbbf24" stroke-width="2" rx="2"/>
  <circle cx="100" cy="185" r="3" fill="#fbbf24"/>
  
  <!-- Check Icon on Chain B -->
  <polyline points="290,185 295,190 305,180" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- only swaps Label -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">Powered by only swaps</text>
  
  <!-- Threshold Network -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Threshold Verification</text>
</svg>
